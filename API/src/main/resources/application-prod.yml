mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.koen.kopms_api.common.util, com.koen.kopms_api.model.vo

  configuration:
    map-underscore-to-camel-case: true
    call-setters-on-nulls: true
    #log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 콘솔에 SQL 출력
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl  # SLF4J로 지정 logback-spring.xml 설정이 적용
    jdbc-type-for-null: VARCHAR

logging:
  config: classpath:logback-prod.xml

app:
  cors:
    allowed-origins: "https://pms.koen.co.kr"  #"http://localhost:5173, http://localhost:3000"

#Actuator
management:
  endpoints:
    web:
      exposure:
        include:
        - "*"
  endpoint:
    shutdown:
      enabled: true
    health:
      show-details: ALWAYS
  health:
    redis:
      enabled: false
